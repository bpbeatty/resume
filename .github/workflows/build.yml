---
name: Build
on:
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

env:
    IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-image:
    name: Build
    runs-on: ubuntu-24.04
    continue-on-error: false
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image_name:
          - resume-writer
    outputs:
      tag: ${{ steps.generate-tags.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v4

      - name: Generate tags
        id: generate-tags
        shell: bash
        run: |
          # Generate Timestamp with incrementing version point
          TIMESTAMP="$(date +%Y%m%d)"
          LIST_TAGS="$(mktemp)"
          while [[ ! -s "$LIST_TAGS" ]]; do
              skopeo list-tags docker://${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }} > "$LIST_TAGS"
          done
          if [[ $(cat "$LIST_TAGS" | jq "any(.Tags[]; contains(\"$TIMESTAMP\"))") == "true" ]]; then
              POINT="1"
              while $(cat "$LIST_TAGS" | jq -e "any(.Tags[]; contains(\"$TIMESTAMP.$POINT\"))")
              do
                  (( POINT++ ))
              done
          fi

          if [[ -n "${POINT:-}" ]]; then
              TIMESTAMP="$TIMESTAMP.$POINT"
          fi

          # Add a sha tag for tracking builds during a pull request
          COMMIT_TAGS=("$(git rev-parse --short HEAD)" "${TIMESTAMP}")
          BUILD_TAGS=("latest" "${TIMESTAMP}")

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              alias_tags=("${COMMIT_TAGS[@]}")
          else
              alias_tags=("${BUILD_TAGS[@]}")
          fi

          echo "alias_tags=${alias_tags[*]}" >> $GITHUB_OUTPUT
          echo "tag=${alias_tags[0]}" >> $GITHUB_OUTPUT

      # Build metadata
      - name: Image Metadata
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5
        id: meta
        with:
          images: |
            ${{ matrix.image_name }}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/bpbeatty/resume/master/README.md
            org.opencontainers.image.description=An image to build my resume
            org.opencontainers.image.title=${{ matrix.image_name }}

      # Build image using Buildah action
      - name: Build Image
        id: build-image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ matrix.image_name }}
          tags: |
            ${{ steps.generate-tags.outputs.alias_tags }}
          labels: ${{ steps.meta.outputs.labels }}
          oci: false

      # Workaround bug where capital letters in your GitHub username make it impossible to push to GHCR.
      # https://github.com/macbre/push-to-ghcr/issues/12
      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@ecd1412d078f2e06e9eedcbaa6fcd988151c3f82 # v8
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push the image to GHCR (Image Registry)
      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        id: push
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ${{ steps.registry_case.outputs.lowercase }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}
          extra-args: |
            --disable-content-trust

      # Sign container
      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        if: github.event_name != 'pull_request'

      - name: Sign container image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY ${{ steps.registry_case.outputs.lowercase }}/${{ steps.build-image.outputs.image }}@${TAGS}
        env:
          TAGS: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      - name: Echo outputs
        run: |
          echo "${{ toJSON(steps.push.outputs) }}"

  build-pdf:
    name: Build PDF
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    needs: build-image
    container:
      image: ghcr.io/bpbeatty/resume-writer:${{ needs.build-image.outputs.tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v4

      - name: Make PDF
        run: make

      - name: Upload PDF
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v4
        with:
          name: bpbeatty-resume
          path: ./bin/resume.pdf
